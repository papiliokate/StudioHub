<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops-Games Binge Mode - Unlimited Play Pass</title>
    <meta name="description" content="Get the Oops-Games Binge Mode pass to unlock unlimited play across all our daily puzzle and arcade games!" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Nunito:wght@700;900&display=swap');
      body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      .container {
        position: relative;
        width: 450px;
        height: 850px;
        flex-shrink: 0;
        transform-origin: center center;
        background: linear-gradient(135deg, #FF9F1C, #FFD166);
        color: #C34B4B;
        text-align: center;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      h1 { font-family: 'Nunito', sans-serif; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
      p { font-size: 1.3rem; margin-bottom: 30px; font-weight: 600; line-height: 1.6; }
      .back-btn {
        background: #C34B4B;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2rem;
        border-radius: 15px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ Binge Puzzles Coming Soon!</h1>
        <p>We're putting the finishing touches on our Binge Mode feature! Soon, you'll be able to purchase additional puzzles to play as much as you want.</p>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <a href="#" class="back-btn" id="mock-purchase-btn" style="display:none; background: #4CAF50;">Mock Purchase ($0.99)</a>
            <a href="/" class="back-btn" id="back-btn">Return to Games Hub</a>
        </div>
    </div>

    <!-- Firebase Analytics Tracking -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";
      
      const firebaseConfig = {
        apiKey: "AIzaSyDgeMPAM9aKivOPLBuF_Fqm8uhedO5jeYc",
        authDomain: "go-rabbit-4af82.firebaseapp.com",
        projectId: "go-rabbit-4af82",
        storageBucket: "go-rabbit-4af82.firebasestorage.app",
        messagingSenderId: "746967187087",
        appId: "1:746967187087:web:d2413f9cb46efae41cbafa",
        measurementId: "G-BJLK9339LN"
      };
      
      try {
        const app = initializeApp(firebaseConfig);
        getAnalytics(app);
      } catch (e) {
        console.warn("Analytics tracking blocked or failed", e);
      }
      
      const urlParams = new URLSearchParams(window.location.search);
      const isCarousel = urlParams.get('carousel') === 'true';
      const playedGames = urlParams.get('played') || '';
      const returnUrl = urlParams.get('returnUrl');
      
      const mockPurchaseBtn = document.getElementById('mock-purchase-btn');
      const backBtn = document.getElementById('back-btn');
      
      if (isCarousel) {
          mockPurchaseBtn.style.display = 'block';
          mockPurchaseBtn.addEventListener('click', (e) => {
              e.preventDefault();
              if (returnUrl) {
                  // Append a param so the game knows to credit tokens if it wants to
                  const separator = returnUrl.includes('?') ? '&' : '?';
                  window.location.href = returnUrl + separator + 'mockPurchase=true';
              } else {
                  window.location.href = '/';
              }
          });
          
          backBtn.textContent = 'Cancel & Advance Carousel';
          backBtn.href = '#';
          backBtn.addEventListener('click', async (e) => {
              e.preventDefault();
              try {
                  const res = await fetch('/carousel_config.json');
                  const gamesList = await res.json();
                  const playedArr = playedGames.split(',').filter(Boolean);
                  const unplayed = gamesList.filter(g => !playedArr.includes(g.id));
                  if (unplayed.length > 0) {
                      const nextGame = unplayed[Math.floor(Math.random() * unplayed.length)];
                      window.location.href = `${nextGame.url}?carousel=true&played=${playedGames}`;
                  } else {
                      window.location.href = '/';
                  }
              } catch(err) {
                  window.location.href = '/';
              }
          });
      }
    </script>
</body>
</html>
