name: Central Video Dispatcher

on:
  schedule:
    - cron: '35 9 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout StudioHub
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Randomly Select Game
        id: select_game
        run: |
          SELECTED=$(node -e "const fs=require('fs');const lines=fs.readFileSync('deploy_ecosystem.js','utf8').split('\n');const repos=lines.filter(l=>l.includes('repo:')).map(l=>l.match(/repo:\s*'([^']+)'/)[1]);console.log(repos[Math.floor(Math.random()*repos.length)]);")
          echo "Selected game: $SELECTED"
          echo "target_repo=$SELECTED" >> $GITHUB_OUTPUT

      - name: Trigger Daily Video Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ steps.select_game.outputs.target_repo }}
          event-type: generate-daily-video
