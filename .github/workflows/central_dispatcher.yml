name: Central Video Dispatcher

on:
  schedule:
    - cron: '35 9 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout StudioHub
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Select Daily Game
        id: select_game
        run: |
          REPOS=($(jq -r '.[] | select(.daily_video_target == true) | .repo' ecosystem.json))
          TOTAL=${#REPOS[@]}
          if [ $TOTAL -eq 0 ]; then
            echo "No games enabled for daily video!"
            exit 1
          fi
          DAY_OF_YEAR=$(date +%j)
          INDEX=$(( (10#$DAY_OF_YEAR) % TOTAL ))
          SELECTED=${REPOS[$INDEX]}
          echo "Selected game: $SELECTED"
          echo "target_repo=$SELECTED" >> $GITHUB_OUTPUT

      - name: Trigger Daily Video Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ steps.select_game.outputs.target_repo }}
          event-type: generate-daily-video
