<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Vault</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('/assets/spooky_crypt.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            backdrop-filter: brightness(0.6);
        }

        #master-vault {
            background: rgba(0,0,0,0.85); 
            border-radius: 20px; 
            padding: 40px; 
            border: 2px solid #9c27b0; 
            box-shadow: 0 0 50px rgba(156, 39, 176, 0.5), inset 0 0 20px rgba(156,39,176,0.3);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .crypt-title {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            color: #e040fb;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px #aa00ff;
            letter-spacing: 2px;
        }

        .radio-labels {
            display: flex; justify-content: center; gap: 30px; margin: 25px 0;
        }
        
        .radio-labels label {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s;
        }

        .radio-labels label:hover, .radio-labels input:checked + span {
            color: #e040fb;
            text-shadow: 0 0 5px rgba(224,64,251,0.5);
        }

        input[type="radio"] {
            accent-color: #aa00ff;
            transform: scale(1.3);
            margin-right: 8px;
        }

        .vault-inputs {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .vault-box {
            width: 45px; height: 60px; 
            text-align: center; 
            font-size: 2rem; 
            text-transform: uppercase; 
            font-family: monospace; 
            border-radius: 8px; 
            border: 2px solid #555; 
            font-weight: bold;
            background: #111;
            color: #00e676;
            box-shadow: inset 0 0 10px black;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .vault-box:focus {
            outline: none;
            border-color: #e040fb;
            box-shadow: 0 0 15px rgba(224, 64, 251, 0.4);
        }

        #vault-submit {
            background: linear-gradient(135deg, #aa00ff, #ff1744); 
            border: none; padding: 15px 40px; 
            font-weight: bold; font-size: 1.5rem; 
            border-radius: 40px; 
            cursor: pointer; 
            display: none;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        
        #vault-submit:hover {
            transform: scale(1.05);
        }

        #vault-error {
            color: #ff1744; 
            margin-top: 20px; 
            font-weight: bold; 
            display: none;
            font-size: 1.2rem;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        #vault-reward {
            display: none;
        }

        .reward-title {
            font-family: 'Creepster', cursive;
            font-size: 4rem;
            color: #00e676;
            text-shadow: 0 0 20px #00c853;
            margin: 0 0 20px 0;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #00c853; }
            100% { text-shadow: 0 0 30px #00e676; }
        }

        #vault-share {
            background: #2196F3; color: white; border: none; padding: 15px 40px; font-weight: bold; font-size: 1.5rem; border-radius: 30px; cursor: pointer; width: 100%; max-width: 300px;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        /* Overlay for transition fade-in */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        body.loaded #fade-overlay {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="fade-overlay"></div>

    <!-- Master Vault Container -->
    <div id="master-vault">
        <h1 class="crypt-title">The Crypt</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 5px;">Enter the Master Key</p>

        <div class="radio-labels">
            <label>
                <input type="radio" name="region" value="us" checked /> <span>U.S.</span>
            </label>
            <label>
                <input type="radio" name="region" value="eu" /> <span>European</span>
            </label>
        </div>

        <div class="vault-inputs">
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
            <input type="text" maxlength="1" class="vault-box" />
        </div>

        <div>
            <button id="vault-submit">Break Seal</button>
        </div>
        <div id="vault-error">The spirits reject your key.</div>
    </div>

    <!-- Master Vault Reward -->
    <div id="vault-reward" style="background: rgba(0,0,0,0.85); border-radius: 20px; padding: 40px; border: 2px solid #00e676; box-shadow: 0 0 50px rgba(0, 230, 118, 0.5), inset 0 0 20px rgba(0,230,118,0.3); max-width: 600px; width: 90%; position: relative; z-index: 10;">
        <h2 class="reward-title">Access Granted</h2>
        <p style="color: white; font-size: 1.5rem; margin-bottom: 30px;">You are a Vault Master.</p>
        <button id="vault-share">📤 Brag & Share</button>
    </div>

    <script type="module" src="./vault.js"></script>
    <script>
        // Simple fade-in effect right on load
        window.onload = () => document.body.classList.add('loaded');
    </script>
</body>
</html>
